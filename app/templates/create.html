{% extends "layout.html" %}

{% block content %}
<div class="max-w-3xl mx-auto">
    <div class="mb-8">
        <h1 class="text-3xl font-bold text-gray-900">Create a New Poll</h1>
        <p class="text-gray-600 mt-2">Fill in the details below to start your voting session.</p>
    </div>

    <form action="{{ url_for('voting.create_voting') }}" method="POST" class="space-y-8 bg-white p-8 rounded-2xl shadow-sm border border-gray-100">
        <div class="space-y-6">
            <div>
                <label for="title" class="block text-sm font-semibold text-gray-700 mb-2">Title</label>
                <input type="text" name="title" id="title" required placeholder="What should we decide?" 
                       class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition-all outline-none">
            </div>

            <div>
                <label for="description" class="block text-sm font-semibold text-gray-700 mb-2">Description (Optional)</label>
                <textarea name="description" id="description" rows="3" placeholder="Provide some context..." 
                          class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition-all outline-none"></textarea>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div>
                    <label for="category" class="block text-sm font-semibold text-gray-700 mb-2">Category</label>
                    <select name="category" id="category" class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition-all outline-none bg-white">
                        <option value="Technology">Technology</option>
                        <option value="Entertainment">Entertainment</option>
                        <option value="Sports">Sports</option>
                        <option value="Food">Food</option>
                        <option value="Other">Other</option>
                    </select>
                </div>
                <div>
                    <label for="image_url" class="block text-sm font-semibold text-gray-700 mb-2">Cover Image URL</label>
                    <input type="url" name="image_url" id="image_url" placeholder="https://images.unsplash.com/..." 
                           class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition-all outline-none">
                </div>
            </div>

            <div class="flex items-center">
                <input type="checkbox" name="is_multiple_choice" id="is_multiple_choice" class="w-4 h-4 text-indigo-600 border-gray-300 rounded focus:ring-indigo-500">
                <label for="is_multiple_choice" class="ml-2 block text-sm text-gray-700">Allow multiple choices</label>
            </div>

            <div class="border-t border-gray-100 pt-6">
                <label class="block text-sm font-semibold text-gray-700 mb-4">Voting Options</label>
                <div id="options-container" class="space-y-3">
                    <div class="flex space-x-2">
                        <input type="text" name="options[]" required placeholder="Option 1" class="flex-grow px-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-indigo-500 outline-none">
                        <button type="button" class="p-3 text-gray-400 hover:text-red-500 transition-colors opacity-0 cursor-default">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M6 18L18 6M6 6l12 12"></path></svg>
                        </button>
                    </div>
                    <div class="flex space-x-2">
                        <input type="text" name="options[]" required placeholder="Option 2" class="flex-grow px-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-indigo-500 outline-none">
                        <button type="button" class="p-3 text-gray-400 hover:text-red-500 transition-colors opacity-0 cursor-default">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M6 18L18 6M6 6l12 12"></path></svg>
                        </button>
                    </div>
                </div>
                <button type="button" id="add-option" class="mt-4 text-sm font-semibold text-indigo-600 hover:text-indigo-700 flex items-center transition-colors">
                    <svg class="w-4 h-4 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
                    Add Option
                </button>
            </div>
        </div>

        <div class="pt-6 border-t border-gray-100 flex justify-end space-x-4">
            <a href="{{ url_for('voting.index') }}" class="px-6 py-3 rounded-xl text-gray-600 font-semibold hover:bg-gray-50 transition-colors">Cancel</a>
            <button type="submit" class="btn-primary text-white px-8 py-3 rounded-xl font-bold shadow-lg transition-all active:scale-95">Create Poll</button>
        </div>
    </form>
</div>
{% endblock %}

{% block scripts %}
<script>
    const container = document.getElementById('options-container');
    const addButton = document.getElementById('add-option');

    addButton.addEventListener('click', () => {
        const div = document.createElement('div');
        div.className = 'flex space-x-2 animate-in slide-in-from-top-2 duration-200';
        div.innerHTML = `
            <input type="text" name="options[]" required placeholder="New Option" class="flex-grow px-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-indigo-500 outline-none">
            <button type="button" class="remove-option p-3 text-gray-400 hover:text-red-500 transition-colors">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
            </button>
        `;
        container.appendChild(div);

        div.querySelector('.remove-option').addEventListener('click', () => {
            div.remove();
        });
    });
</script>
{% endblock %}
